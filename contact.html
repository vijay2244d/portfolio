<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Contact - M. Vijay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Gochi+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- SEO and ATS & AI Parsing Optimization -->
    <meta name="description" content="Portfolio of M. Vijay, a Data-Driven B.Com (PA) Student skilled in Python, Excel, Power BI, and Accounting.">
    <meta name="keywords" content="M. Vijay, Portfolio, Data Analysis, Python, Power BI, Excel, Accounting">
    <meta name="author" content="M. Vijay">
    <meta property="og:title" content="M. Vijay - Portfolio">
    <meta property="og:description" content="Portfolio of M. Vijay, a Data-Driven B.Com (PA) Student.">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "M. Vijay",
      "jobTitle": "Student",
      "alumniOf": {
        "@type": "CollegeOrUniversity",
        "name": "The Madura College"
      },
      "knowsAbout": ["Data Analysis", "Python", "MS Excel", "Power BI", "Accounting", "Tally Prime"]
    }
    </script>
</head>
<body style="padding-top: 100px; background: transparent !important;">
    <!-- Hyperspeed Background Container -->
    <div id="hyperspeed-container" style="position: fixed; inset: 0; z-index: -10; background: #000; overflow: hidden;"></div>
    <!-- Intro Overlay -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-content">
            <svg class="ringing-phone" viewBox="0 0 24 24" fill="white" width="120" height="120">
                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
            </svg>
            <h1 class="intro-text">Get in Touch!</h1>
        </div>
    </div>

    <header class="scrolled">
        <nav>
            <a href="index.html" class="logo">M.Vijay</a>
            <ul class="nav-links">
                <li><a href="about.html">About</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" style="color: var(--primary);">Contact</a></li>
            </ul>
            <div class="hamburger">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </nav>
    </header>

    <main>
        <section id="contact" class="contact section slide-up">
            <h2 class="section-title">Get In Touch</h2>
            <div class="contact-actions-standalone" style="display: flex; flex-direction: row; flex-wrap: wrap; gap: 2rem; justify-content: center; max-width: 800px; margin: 0 auto;">
                <button class="card action-card" onclick="triggerCall()" style="cursor: pointer; text-align: center; padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-width: 250px; border: none; background: var(--bg-card);">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="#137fec" style="margin-bottom: 1.5rem; display: block;">
                        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                    </svg>
                    <h3 style="color: var(--primary); margin-bottom: 0.5rem; font-size: 1.5rem;">Schedule a Call</h3>
                    <p style="color: var(--text-muted); font-size: 1rem; font-weight: 400;">Click to instantly connect</p>
                </button>
                
                <button class="card action-card" onclick="triggerMail()" style="cursor: pointer; text-align: center; padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; min-width: 250px; border: none; background: var(--bg-card);">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt="Gmail" width="60" height="60" style="margin-bottom: 1.5rem; display: block;">
                    <h3 style="color: var(--secondary); margin-bottom: 0.5rem; font-size: 1.5rem;">Gmail Contact</h3>
                    <p style="color: var(--text-muted); font-size: 1rem; font-weight: 400;">Send an email securely</p>
                </button>
            </div>

            <script>
                function triggerCall() {
                    const overlay = document.createElement('div');
                    overlay.className = 'intro-overlay'; 
                    overlay.style.animation = 'none'; 
                    overlay.style.backgroundColor = 'rgba(13, 17, 23, 0.95)';
                    overlay.innerHTML = `
                        <div class="intro-content">
                            <svg class="ringing-phone" viewBox="0 0 24 24" fill="var(--primary)" width="100" height="100">
                                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                            </svg>
                            <h2 style="color: white; font-size: 2rem; margin-top: 1.5rem;">Connecting...</h2>
                        </div>
                    `;
                    document.body.appendChild(overlay);

                    setTimeout(() => {
                        overlay.style.animation = 'slideUpOut 0.8s cubic-bezier(0.8, 0, 0.2, 1) forwards';
                        
                        // Provision for future number update
                        const phoneNumber = "+917810071916"; 
                        window.location.href = "tel:" + phoneNumber;
                        
                        setTimeout(() => {
                            overlay.remove();
                        }, 800);
                    }, 1200); 
                }

                function triggerMail() {
                    // Obfuscated email to hide it mostly from the UI until redirecting to mailing app
                    const user = 'hv6422110';
                    const domain = 'gmail.com';
                    window.location.href = 'mailto:' + user + '@' + domain;
                }
            </script>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 M. Vijay. Built with passion.</p>
    </footer>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/postprocessing@6.29.3/build/postprocessing.js"></script>
    <script src="hyperspeed.js"></script>
</body>
</html>
